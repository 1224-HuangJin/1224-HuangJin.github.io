<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航网站</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            width: 80%;
            margin: 20px auto;
        }
        .section {
            background-color: #fff;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .section header {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            padding: 10px;
            user-select: none;
        }
        .section .content {
            display: none;
            padding: 10px;
            background-color: #f9f9f9;
        }
        .section .content a {
            display: block;
            padding: 8px 0;
            color: #333;
            text-decoration: none;
        }
        .section .content a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>欢迎来到我的导航网站</h1>
    <p>点击下面的分类标题展开链接</p>
</header>

<div class="container">
    <div class="section" id="games">
        <header onclick="toggleSection('games')">↓ 游戏类网站</header>
        <div class="content">
            <a href="https://www.minecraft.net/" target="_blank">Minecraft</a>
            <a href="https://www.roblox.com/" target="_blank">Roblox</a>
        </div>
    </div>

    <div class="section" id="learning">
        <header onclick="toggleSection('learning')">↓ 学习资源</header>
        <div class="content">
            <a href="https://www.w3schools.com/" target="_blank">W3Schools</a>
            <a href="https://developer.mozilla.org/zh-CN/" target="_blank">MDN Web Docs</a>
        </div>
    </div>

    <div class="section" id="tools">
        <header onclick="toggleSection('tools')">↓ 工具网站</header>
        <div class="content">
            <a href="https://codepen.io/" target="_blank">CodePen</a>
            <a href="https://github.com/" target="_blank">GitHub</a>
        </div>
    </div>
</div>

<script>
    function toggleSection(sectionId) {
        const content = document.querySelector(`#${sectionId} .content`);
        if (content.style.display === 'block') {
            content.style.display = 'none';
        } else {
            content.style.display = 'block';
        }
    }
</script>

</body>
</html>
