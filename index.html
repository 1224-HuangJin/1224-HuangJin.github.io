<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 定义字符编码和视口设置 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 网页标题 -->
  <title>我的导航网站</title>
  
  <!-- 内部样式表，定义页面的 CSS 样式 -->
  <style>
    /* 设置整个页面的基础样式 */
    body {
      margin: 0; /* 去除浏览器默认的边距 */
      font-family: Arial, sans-serif; /* 设置全局字体 */
      background-color: #f4f4f4; /* 设置背景颜色 */
    }
    
    /* 页眉区域的样式 */
    header {
      background-color: #333; /* 深色背景 */
      color: #fff; /* 白色文字 */
      padding: 20px; /* 内边距 */
      text-align: center; /* 文字居中 */
    }
    
    /* 页眉中段落的样式 */
    header p {
      margin-top: 10px; /* 顶部外边距 */
      font-size: 0.9em; /* 字体相对较小 */
      color: #ccc; /* 浅灰色文字 */
    }
    
    /* 主容器样式，用于限制内容宽度并居中显示 */
    .container {
      max-width: 800px;  /* 最大宽度 */
      margin: 20px auto; /* 上下边距为20px，左右自动居中 */
      padding: 0 20px;   /* 内边距 */
    }
    
    /* 导航板块的整体样式 */
    .section {
      background-color: #fff; /* 白色背景 */
      border-radius: 5px;     /* 边角圆润 */
      margin-bottom: 20px;    /* 下边距，板块间隔 */
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* 添加阴影效果 */
      overflow: hidden;       /* 隐藏溢出的内容 */
    }
    
    /* 导航板块标题的样式 */
    .section header {
      background-color: #4CAF50; /* 绿色背景 */
      color: #fff;               /* 白色文字 */
      padding: 10px;             /* 内边距 */
      cursor: pointer;           /* 鼠标悬停显示指针，提示可点击 */
      user-select: none;         /* 禁止文本被选中 */
    }
    
    /* 当鼠标悬停在板块标题上时，改变背景颜色 */
    .section header:hover {
      background-color: #45a049; /* 更深的绿色 */
    }
    
    /* 导航板块内容区域样式 */
    .section .content {
      padding: 10px;  /* 内边距 */
      display: none;  /* 默认隐藏内容，点击标题后显示 */
    }
    
    /* 导航链接的样式 */
    .section .content a {
      display: block;           /* 链接独占一行 */
      padding: 8px 0;           /* 上下内边距 */
      color: #333;              /* 链接文字颜色 */
      text-decoration: none;    /* 默认无下划线 */
    }
    
    /* 鼠标悬停在链接上时显示下划线 */
    .section .content a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- 页眉区域：显示网站标题和简单说明 -->
  <header>
    <h1>我的导航网站</h1>
    <p>点击下面的分类标题展开或收起链接</p>
  </header>
  
  <!-- 主容器：包裹所有导航板块 -->
  <div class="container">
    <!-- 第一板块：游戏类导航 -->
    <div class="section" id="section1">
      <!-- 该标题可点击，点击时调用 JavaScript 函数 toggleSection() 来展开或收起内容 -->
      <header onclick="toggleSection('section1')">↓ 游戏类导航</header>
      <!-- 内容区域：包含多个链接，初始状态为隐藏 -->
      <div class="content">
        <!-- 每个链接使用 <a> 标签，并设置 target="_blank" 使链接在新窗口打开 -->
        <a href="https://www.minecraft.net/" target="_blank">Minecraft</a>
        <a href="https://www.roblox.com/" target="_blank">Roblox</a>
        <a href="https://store.steampowered.com/" target="_blank">Steam</a>
      </div>
    </div>
    
    <!-- 第二板块：学习资源 -->
    <div class="section" id="section2">
      <header onclick="toggleSection('section2')">↓ 学习资源</header>
      <div class="content">
        <a href="https://www.w3schools.com/" target="_blank">W3Schools</a>
        <a href="https://developer.mozilla.org/zh-CN/" target="_blank">MDN Web Docs</a>
        <a href="https://www.freecodecamp.org/" target="_blank">freeCodeCamp</a>
      </div>
    </div>
    
    <!-- 第三板块：工具和资源 -->
    <div class="section" id="section3">
      <header onclick="toggleSection('section3')">↓ 工具和资源</header>
      <div class="content">
        <a href="https://codepen.io/" target="_blank">CodePen</a>
        <a href="https://github.com/" target="_blank">GitHub</a>
        <a href="https://www.figma.com/" target="_blank">Figma</a>
      </div>
    </div>
    
    <!-- 第四板块：其他链接 -->
    <div class="section" id="section4">
      <header onclick="toggleSection('section4')">↓ 其他链接</header>
      <div class="content">
        <a href="https://www.google.com/" target="_blank">Google</a>
        <a href="https://www.youtube.com/" target="_blank">YouTube</a>
        <a href="https://twitter.com/" target="_blank">Twitter</a>
      </div>
    </div>
  </div>
  
  <!-- JavaScript 区域：用于控制板块的展开和收起 -->
  <script>
    /**
     * toggleSection 函数用于切换指定板块内容的显示状态
     * @param {string} sectionId - 要切换的板块的 ID
     */
    function toggleSection(sectionId) {
      // 获取对应的板块元素
      const section = document.getElementById(sectionId);
      // 从板块中获取内容区域（class 为 "content"）
      const content = section.querySelector('.content');
      
      // 判断当前内容是否显示
      if (content.style.display === 'block') {
        // 如果当前为显示状态，则隐藏内容
        content.style.display = 'none';
      } else {
        // 如果当前为隐藏状态，则显示内容
        content.style.display = 'block';
      }
    }
  </script>
</body>
</html>
